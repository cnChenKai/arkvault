name: Build ArkVault

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  COMMANDLINE_TOOLS_VERSION: "6.1.0.830"
  CLI_TOOLS_RELEASE: "https://github.com/cnChenKai/arkvault/releases/download/cli-tools-v6.1.0.830"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Cache Command Line Tools
        id: cache-cli
        uses: actions/cache@v4
        with:
          path: /opt/command-line-tools
          key: harmonyos-cli-v5-${{ env.COMMANDLINE_TOOLS_VERSION }}

      - name: Download Command Line Tools
        if: steps.cache-cli.outputs.cache-hit != 'true'
        run: |
          cd /tmp
          wget -nv "${{ env.CLI_TOOLS_RELEASE }}/commandline-tools.zip.part_aa"
          wget -nv "${{ env.CLI_TOOLS_RELEASE }}/commandline-tools.zip.part_ab"
          wget -nv "${{ env.CLI_TOOLS_RELEASE }}/commandline-tools.zip.part_ac"
          cat commandline-tools.zip.part_* > commandline-tools.zip
          rm commandline-tools.zip.part_*
          sudo mkdir -p /opt/command-line-tools
          sudo unzip -q commandline-tools.zip -d /tmp/cli-extract
          sudo cp -r /tmp/cli-extract/command-line-tools/. /opt/command-line-tools/
          sudo chmod -R 755 /opt/command-line-tools
          sudo rm -rf /tmp/cli-extract /tmp/commandline-tools.zip

      - name: Setup Environment
        run: |
          echo "COMMANDLINE_TOOL_DIR=/opt/command-line-tools" >> $GITHUB_ENV
          echo "DEVECO_SDK_HOME=/opt/command-line-tools/sdk" >> $GITHUB_ENV
          echo "/opt/command-line-tools/ohpm/bin" >> $GITHUB_PATH
          echo "/opt/command-line-tools/hvigor/bin" >> $GITHUB_PATH

      - name: Configure npm registry
        run: |
          npm config set @ohos:registry=https://repo.harmonyos.com/npm/
          echo '@ohos:registry=https://repo.harmonyos.com/npm/' >> ~/.npmrc

      - name: Install Dependencies
        run: |
          ohpm install --registry https://repo.harmonyos.com/ohpm/

      - name: Build HAP (unsigned)
        run: |
          cp build-profile.ci.json5 build-profile.json5
          hvigorw assembleHap --mode module -p product=default --no-daemon

      - name: Sign HAP
        env:
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          SIGNING_CER: ${{ secrets.SIGNING_CER }}
          SIGNING_PROFILE: ${{ secrets.SIGNING_PROFILE }}
        run: |
          # 准备签名文件
          echo "$SIGNING_CER" | base64 -d > signing.cer
          echo "$SIGNING_PROFILE" | base64 -d > signing.p7b
          echo "$SIGNING_P12" | base64 -d > signing.p12

          UNSIGNED_HAP=$(find entry/build -name "*unsigned*.hap" | head -1)
          SIGNED_HAP="${UNSIGNED_HAP/unsigned/signed}"

          echo "Signing: $UNSIGNED_HAP -> $SIGNED_HAP"

          java -jar /opt/command-line-tools/sdk/default/openharmony/toolchains/lib/hap-sign-tool.jar sign-app \
            -mode localSign \
            -keyAlias arkvault \
            -keyPwd "$P12_PASSWORD" \
            -appCertFile signing.cer \
            -profileFile signing.p7b \
            -inFile "$UNSIGNED_HAP" \
            -signAlg SHA256withECDSA \
            -keystoreFile signing.p12 \
            -keystorePwd "$P12_PASSWORD" \
            -outFile "$SIGNED_HAP" \
            -compatibleVersion 12 \
            -signCode 1

          echo "✅ Signed: $SIGNED_HAP"

      - name: Upload Signed HAP
        uses: actions/upload-artifact@v4
        with:
          name: arkvault-hap-signed
          path: entry/build/default/outputs/default/*signed*.hap
          retention-days: 30
